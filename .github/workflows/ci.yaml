name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-retrieval:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_WORKSPACE: retrieval
      GLIF_TOKEN: ${{ secrets.GLIF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  lint-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run test:types